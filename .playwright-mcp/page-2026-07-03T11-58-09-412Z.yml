          - heading "How Project Xolvon Works" [level=2] [ref=e74]
          - paragraph [ref=e75]: How live attention programs stitch signal to action so founders, researchers, and civic operators move fast and prove impact.
        - generic [ref=e77]:
          - paragraph [ref=e78]: Project Xolvon turns real-world execution into systems that can run, learn, and scale.
          - paragraph [ref=e79]: We start from live projects, not hypotheses. Each build is treated as an experiment that is designed to operate end-to-end, capturing decisions, workflows, and outcomes as structured assets. As systems run, they generate reusable processes, data, and operational knowledge that can be applied beyond a single use case.
          - paragraph [ref=e80]: Automation handles repeatable execution, while humans stay responsible for direction, judgment, and adaptation to context. This balance ensures speed without losing relevance, especially in complex, high-impact environments.
          - paragraph [ref=e81]: When a system proves effective, it is packaged into deployable workflows and products. These outputs allow founders and operators to move faster using systems that have already been tested in the field, reducing execution risk and compounding impact over time.
          - paragraph [ref=e82]: Project Xolvon is not about shipping features. It is about shipping execution that can be repeated, transferred, and scaled.
